name: solo_leveling_workout
description: "A Solo Leveling themed workout tracking app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.0
  google_fonts: ^6.1.0
  table_calendar: ^3.0.9
  # flutter_local_notifications: ^17.2.2  # Removido temporalmente

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/

  # Google Fonts se manejan automáticamente, no necesitamos declarar fuentes locales